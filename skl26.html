<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pengumuman Kelulusan | MTs Irsyaduth Thullab Tedunan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="main-container">
    <div class="header-islamic">
        <h1><i class="fas fa-mosque"></i> MTs Irsyaduth Thullab <i class="fas fa-star-and-crescent"></i></h1>
        <p>Tedunan | Terang Hati, Berprestasi & Bertakwa</p>
        <p style="font-size:0.75rem; margin-top:6px;"><i class="fas fa-graduation-cap"></i> Pengumuman Kelulusan Kelas 9</p>
    </div>

    <!-- Timer -->
    <div class="timer-card" id="timerWidget">
        <div class="timer-label">
            <i class="fas fa-hourglass-half"></i> MENUJU PENGUMUMAN RESMI
        </div>
        <div class="timer-digits" id="countdownDisplay">
            <div class="time-block"><div class="time-number" id="days">00</div><div class="time-label">Hari</div></div>
            <div class="time-block"><div class="time-number" id="hours">00</div><div class="time-label">Jam</div></div>
            <div class="time-block"><div class="time-number" id="minutes">00</div><div class="time-label">Menit</div></div>
            <div class="time-block"><div class="time-number" id="seconds">00</div><div class="time-label">Detik</div></div>
        </div>
        <div style="font-size: 0.7rem; margin-top: 12px;" id="targetDateText"></div>
    </div>

    <div class="content-area" id="appContent">
        <!-- Login Panel -->
        <div id="loginPanel">
            <div class="login-card">
                <h3><i class="fas fa-key"></i> Akses Pengumuman</h3>
                <div class="input-group">
                    <label><i class="fas fa-user-graduate"></i> Username / NIS</label>
                    <input type="text" id="username" placeholder="Masukkan username/NIS" autocomplete="off">
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Kata sandi">
                </div>
                <button class="btn-login" id="loginBtn"><i class="fas fa-unlock-alt"></i> Masuk & Lihat Kelulusan</button>
            </div>
        </div>

        <!-- Dashboard Kelulusan (awal tersembunyi) -->
        <div id="graduatePanel" style="display: none;">
            <div class="graduate-panel">
                <!-- Area untuk pesan "belum dibuka" atau konten kelulusan -->
                <div id="announcementContent">
                    <!-- akan diisi oleh script berdasarkan waktu -->
                </div>
                <div style="text-align: center; margin-top: 15px;">
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout & Kembali</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <i class="fas fa-praying-hands"></i> "Maka sesungguhnya bersama kesulitan ada kemudahan" (QS. Al-Insyirah) <br>
        © Panitia Kelulusan MTs Irsyaduth Thullab Tedunan
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
